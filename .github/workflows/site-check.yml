name: site check

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  links:
    name: local link targets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Check local osauer.dev links
        run: node tools/check-site-links.mjs
